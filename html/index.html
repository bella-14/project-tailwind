<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance your money</title>
    <link rel="stylesheet" href="/dist/css/styles.css">
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-green-400 text-white p-5 shadow-lg" >
        <h1 class="text-3xl font-bold">Finance Your Money</h1>
        <p>Controle suas metas e financas</p>
    </header>

    <main>
        <div class="flex justify-between items-center p-5 gap-3 mb-6">
            <h2 class="text-3xl p-2 font-bold">Metas Financeiras</h2>
    <button class="text-right p-5 bg-green-400 hover:bg-green-500 px-4 rounded-lg">
        +Adicionar nova meta
    </button>
       </div>

    <div class="mb-4 ">
        <h3 class="font-semibold p-4 text-3xl">Viagem para Italia</h3>
    </div>

    <div class="flex justify-between mt-2 text-3xl p-3 gap-2">
        <p>Objetivo: R$ 5.000</p>
        <span>Atual: R$2.900</span>
    </div>

   <div class="w-full bg-gray-200 rounded-full h-4">
    <div class="bg-gray-500 h-4 rounded-full w-[58%]"></div>
</div>

     <p class="p-3 text-2xl">Faltam R$2.100 para concluir sua meta</p>

    </div>
        <h3 class="font-semibold p-4 text-3xl">Casa Propria</h3>
    </div>

    <div class="flex justify-between mt-2 text-3xl p-3">
        <p>Objetivo: R$ 200.000</p>
        <span>Atual: R$55.000</span>
    </div>

     <div class="w-full bg-gray-200 rounded-full h-4">
     <div class="bg-gray-500 h-4 rounded-full w-[20%]"></div>
    </div>

     <p class="p-3 text-2xl">Faltam R$145.000 para concluir sua meta</p>

    </main>

</html>
